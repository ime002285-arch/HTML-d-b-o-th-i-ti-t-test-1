<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thời Tiết Hiện Tại</title>
    <!-- Phục vụ cho Android App PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1c29">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3222/3222800.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="clear-day"> <!-- Default theme -->

    <div class="app-container">
        <!-- Header / Search -->
        <header class="header">
            <div class="search-bar">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm thành phố..." autocomplete="off">
                <button id="location-btn" class="location-btn" title="Vị trí hiện tại">
                    <i class="ph-fill ph-navigation-arrow"></i>
                </button>
            </div>
            <ul id="search-results" class="search-results hidden"></ul>
        </header>

        <!-- Main Weather Info -->
        <main class="main-weather">
            <div id="loading" class="loading hidden">
                <i class="ph ph-spinner-gap spinner"></i>
                <p>Đang tải dữ liệu...</p>
            </div>

            <div id="weather-content" class="weather-content hidden">
                <h1 id="city-name">Hà Nội</h1>
                <p id="current-date">Thứ Hai, 15 Tháng 5</p>
                
                <div class="temperature-container">
                    <div class="weather-icon-large">
                        <i id="main-icon" class="ph-fill ph-sun"></i>
                    </div>
                    <div class="temp-detail">
                        <span id="current-temp">28°</span>
                        <span id="weather-desc" class="condition">Trời Nắng</span>
                    </div>
                </div>

                <!-- Weather Details Glass Card -->
                <div class="weather-details glass-panel">
                    <div class="detail-item">
                        <i class="ph ph-wind"></i>
                        <div class="detail-info">
                            <span class="label">Gió</span>
                            <span id="wind-speed" class="value">12 km/h</span>
                        </div>
                    </div>
                    <div class="detail-separator"></div>
                    <div class="detail-item">
                        <i class="ph ph-drop"></i>
                        <div class="detail-info">
                            <span class="label">Độ ẩm</span>
                            <span id="humidity" class="value">65%</span>
                        </div>
                    </div>
                    <div class="detail-separator"></div>
                    <div class="detail-item">
                        <i class="ph ph-eye"></i>
                        <div class="detail-info">
                            <span class="label">Tầm nhìn</span>
                            <span id="visibility" class="value">10 km</span>
                        </div>
                    </div>
                </div>

                <!-- Forecast Section -->
                <section class="forecast-section">
                    <div class="section-header">
                        <h2>Dự báo trong ngày</h2>
                        <a href="#" class="view-all">7 Ngày <i class="ph ph-caret-right"></i></a>
                    </div>
                    
                    <div class="hourly-forecast glass-panel">
                        <div id="hourly-container" class="hourly-container">
                            <!-- Hourly items will be injected by JS -->
                        </div>
                    </div>
                </section>
                
                <!-- Daily forecast (hidden by default, shown on click 7 ngày) -->
                <section id="daily-forecast" class="daily-forecast hidden">
                    <div class="section-header">
                        <h2>Dự báo 7 ngày</h2>
                        <button id="close-daily" class="close-btn"><i class="ph ph-x"></i></button>
                    </div>
                    <div id="daily-container" class="daily-container glass-panel">
                        <!-- Daily items will be injected by JS -->
                    </div>
                </section>
            </div>
            
            <div id="error-message" class="error-message hidden">
                <i class="ph ph-warning-circle"></i>
                <p id="error-text">Không tìm thấy thông tin.</p>
                <button id="retry-btn">Thử lại</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
